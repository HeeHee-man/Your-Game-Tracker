<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset="UTF-8">
        <title>YourGameTracker</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <main>
            <div id = "upperdiv">
                <h1 class = "title">YOUR GAME TRACKER</h1>
                <div id = "table">
                    <div id = "input">
                        <input type = "text" id = "game_input" placeholder = "Game title">
                        <button id = "add_game">ADD!</button>
                    </div>
                    <table id = "game_table">
                        <tr>
                            <th style = "background-color:gold;">Your Games</th>
                            <th style = "background-color: rgb(0, 171, 0);">Status</th>
                            <th style = "background-color:rgb(255, 56, 21);">Delete</th>
                        </tr>
                    </table>
                </div>
                <div id = "fun_thing">
                    <button id = "waste_button">Click this to waste your time</button>
                    <p id = "clicks_wasted" style = "color:white;">Clicks wasted: 0</p>
                    <p id = "stop_wasting_your_time" style = "color:white;"></p>
                </div>
            </div>
        </main>
        <script src="script.js"></script>
    </body>
</html>
